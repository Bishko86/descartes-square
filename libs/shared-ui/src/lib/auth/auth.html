<div class="sign-in-container">
  <form class="sign-in-form" (submit)="$event.preventDefault(); submit()">
    <h2>{{ authTitle() }}</h2>
    <mat-form-field appearance="fill">
      <mat-label i18n="@@email">Email</mat-label>
      <input
        matInput
        type="email"
        i18n-placeholder="@@emailPlaceholder"
        placeholder="Enter your email"
        [autocomplete]="'email'"
        [formField]="authForm.email"
      />
    </mat-form-field>

    @if (!authForm.username().hidden()) {
      <mat-form-field appearance="fill">
        <mat-label i18n="@@username">Username</mat-label>
        <input
          matInput
          type="text"
          i18n-placeholder="@@usernamePlaceholder"
          placeholder="Enter your name"
          [formField]="authForm.username"
        />
      </mat-form-field>
    }

    <mat-form-field>
      <mat-label i18n="@@password">Password</mat-label>
      <input
        matInput
        i18n-placeholder="@@passwordPlaceholder"
        placeholder="Enter your password"
        [type]="hidePassword() ? 'password' : 'text'"
        [autocomplete]="'new-password'"
        [formField]="authForm.password"
      />
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword.set(!hidePassword())"
      >
        <mat-icon>{{
          hidePassword() ? "visibility_off" : "visibility"
        }}</mat-icon>
      </button>
    </mat-form-field>

    @if (!authForm.confirmPassword().hidden()) {
      <mat-form-field>
        <mat-label i18n="@@confirm-password">Confirm Password</mat-label>
        <input
          matInput
          i18n-placeholder="@@confirm-passwordPlaceholder"
          placeholder="Confirm your password"
          autocomplete="off"
          [type]="hidePassword() ? 'password' : 'text'"
          [formField]="authForm.confirmPassword"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword.set(!hidePassword())"
        >
          <mat-icon>{{
            hidePassword() ? "visibility_off" : "visibility"
          }}</mat-icon>
        </button>
      </mat-form-field>
      @if (hasPasswordMismatch()) {
        <p class="field-error" i18n="@@passwordMismatch">Passwords do not match</p>
      }
    }

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="submitDisabled()"
    >
      {{ authTitle() }}
    </button>
  </form>
</div>
