<div class="auth-error-container">
  <div class="auth-error-card">
    <mat-icon class="error-icon" color="warn">error_outline</mat-icon>
    <h2>{{ errorTitle }}</h2>
    <p>{{ errorMessage }}</p>
    <a mat-raised-button color="primary" routerLink="/sign-in" i18n="@@signInWithPassword">
      Sign in with password
    </a>
  </div>
</div>
