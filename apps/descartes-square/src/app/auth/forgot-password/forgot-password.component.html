@if (sent()) {
  <div class="forgot-password-container">
    <div class="forgot-password-card">
      <mat-icon class="status-icon">mark_email_read</mat-icon>
      <h2 i18n="@@forgotPasswordSentTitle">Check your inbox</h2>
      <p i18n="@@forgotPasswordSentMessage">
        If an account exists for that email, a password reset link has been sent.
      </p>
      <a mat-button [routerLink]="'/' + signInRoute" i18n="@@forgotPasswordBackToSignIn">
        Back to sign in
      </a>
    </div>
  </div>
} @else {
  <div class="forgot-password-container">
    <div class="forgot-password-card">
      <mat-icon class="status-icon">lock_reset</mat-icon>
      <h2 i18n="@@forgotPasswordTitle">Reset your password</h2>
      <p i18n="@@forgotPasswordDesc">Enter your email and we'll send you a reset link.</p>

      <mat-form-field appearance="outline">
        <mat-label i18n="@@email">Email</mat-label>
        <input
          matInput
          type="email"
          #emailInput
          i18n-placeholder="@@emailPlaceholder"
          placeholder="Enter your email"
        />
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="submit(emailInput.value)" i18n="@@forgotPasswordButton">
        Send reset link
      </button>

      <a mat-button [routerLink]="'/' + signInRoute" i18n="@@forgotPasswordBackToSignIn">
        Back to sign in
      </a>
    </div>
  </div>
}
