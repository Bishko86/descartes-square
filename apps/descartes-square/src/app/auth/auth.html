@if (signUpSuccess()) {
  <div class="signup-success">
    <div class="success-card">
      <mat-icon class="success-icon">mark_email_read</mat-icon>
      <h2 i18n="@@signUpSuccessTitle">Check your inbox</h2>
      <p i18n="@@signUpSuccessMessage">
        Registration successful! We've sent a verification link to your email — click it to activate your account.
      </p>
      <a mat-button routerLink="/sign-in" class="back-link" i18n="@@signUpSuccessBackToSignIn">
        Back to sign in
      </a>
    </div>
  </div>
} @else {
  <lib-auth [apiUrl]="apiUrl" [locale]="locale" (submitEvent)="submit($event)"></lib-auth>

  @if (showResend()) {
    <div class="resend-verification">
      <p i18n="@@emailNotVerifiedMessage">Your email is not verified yet.</p>
      <button mat-raised-button color="primary" (click)="resendVerification()" i18n="@@resendVerificationButton">
        Resend verification email
      </button>
    </div>
  }
}
