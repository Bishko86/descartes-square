<div class="confirm">
  <div class="confirm__header">
    @if (showIcon) {
      <mat-icon class="confirm__icon" [class.confirm__icon--delete]="data.type === 'delete'" [class.confirm__icon--warning]="data.type === 'warning'">warning</mat-icon>
    }
    <h2 class="confirm__title">{{ dialogTitle }}</h2>
  </div>

  <p class="confirm__description">{{ description }}</p>

  <div class="confirm__actions">
    <button class="confirm__cancel" mat-button (click)="cancel()">
      {{ cancelLabel }}
    </button>
    <button
      class="confirm__confirm"
      [class.confirm__confirm--delete]="data.type === 'delete'"
      [class.confirm__confirm--warning]="data.type === 'warning'"
      mat-button
      (click)="confirm()">
      {{ confirmLabel }}
    </button>
  </div>
</div>
