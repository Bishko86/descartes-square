<section class="descartes-list">
  @if (dataSource().length) {
    <div class="descartes-list__header">
      <button
        matButton="elevated"
        class="descartes-list__add-data"
        i18n="@@addBtn"
        (click)="addData()"
      >
        Add data
      </button>
    </div>

    <div class="descartes-list__grid">
      @for (item of dataSource(); track item.id) {
        <app-descartes-solution-card
          [solution]="item"
          (view)="view($event)"
          (edit)="update($event)"
          (remove)="delete($event)"
        />
      }
    </div>
  } @else {
    <div class="descartes-list__empty-state">
      <svg
        class="descartes-list__empty-illustration"
        viewBox="0 0 100 90"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <rect
          x="10"
          y="16"
          width="68"
          height="62"
          rx="7"
          stroke="var(--muted)"
          stroke-width="2.5"
        />
        <line
          x1="22"
          y1="34"
          x2="66"
          y2="34"
          stroke="var(--muted)"
          stroke-width="2.5"
          stroke-linecap="round"
        />
        <line
          x1="22"
          y1="46"
          x2="66"
          y2="46"
          stroke="var(--muted)"
          stroke-width="2.5"
          stroke-linecap="round"
        />
        <line
          x1="22"
          y1="58"
          x2="52"
          y2="58"
          stroke="var(--muted)"
          stroke-width="2.5"
          stroke-linecap="round"
        />
        <circle
          cx="72"
          cy="18"
          r="11"
          fill="var(--surface)"
          stroke="var(--muted)"
          stroke-width="2"
        />
        <line
          x1="72"
          y1="13"
          x2="72"
          y2="23"
          stroke="var(--muted)"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="67"
          y1="18"
          x2="77"
          y2="18"
          stroke="var(--muted)"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <h2 class="descartes-list__empty-title" i18n="@@emptyState.title">
        No decisions yet
      </h2>
      <p class="descartes-list__empty-subtitle" i18n="@@emptyState.subtitle">
        Create your first Descartes Square to start analyzing decisions clearly
        and confidently.
      </p>
      <button
        matButton="tonal"
        class="descartes-list__empty-cta"
        (click)="addData()"
        i18n="@@emptyState.cta"
      >
        <mat-icon>add</mat-icon>
        Create new square
      </button>
    </div>
  }
</section>
