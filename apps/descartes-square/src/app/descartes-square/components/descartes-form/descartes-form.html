<ng-template #activeCardTpl>
  @let ctx = activeContext();
  <app-quadrant-card
    [questionId]="ctx.id"
    [questionNumber]="ctx.number"
    [question]="ctx.question"
    [subtitle]="ctx.subtitle"
    [items]="ctx.items"
    [suggestions]="ctx.suggestions"
    [isStreaming]="ctx.isStreaming"
    [canSuggest]="canSuggest()"
    (add)="onArgumentAdd(ctx.id)"
    (remove)="onArgumentRemove(ctx.id, $event)"
    (changeArgument)="onArgumentChange(ctx.id, $event.index, $event.value)"
    (reorder)="onArgumentReorder(ctx.id, $event.from, $event.to)"
    (requestSuggestion)="onRequestSuggestion(ctx.id)"
    (acceptSuggestion)="onAcceptSuggestion(ctx.id, $event, 0)"
    (dismissSuggestion)="onDismissSuggestion(ctx.id, $event)"
  />
</ng-template>

<header class="descartes-form__header">
  <div class="descartes-form__title-wrap">
    <label class="descartes-form__title-label" i18n="@@yourDecisionLabel">Your Decision</label>
    <input
      type="text"
      class="descartes-form__title"
      [formField]="form.field.title"
      i18n-placeholder="@@titlePlaceholder"
      placeholder="Should I…?"
      autofocus
    />
  </div>
  <app-progress-pill [counts]="form.counts()" />
</header>

<section
  class="descartes-form__grid"
  [class.is-locked]="form.isLocked()"
  aria-label="Descartes square"
  i18n-aria-label="@@descartesSquareAria"
>
  <span
    class="descartes-form__axis descartes-form__axis--top"
    i18n="@@axisOutcomesActing"
  >
    Outcomes of acting
  </span>
  <span
    class="descartes-form__axis descartes-form__axis--bottom"
    i18n="@@axisOutcomesNotActing"
  >
    Outcomes of not acting
  </span>
  <span
    class="descartes-form__axis descartes-form__axis--left"
    i18n="@@axisGains"
  >
    Gains
  </span>
  <span
    class="descartes-form__axis descartes-form__axis--right"
    i18n="@@axisLosses"
  >
    Losses
  </span>

  @for (id of order; track id) {
    @if (id === activeQuadrant()) {
      <div class="descartes-form__active-slot" [style.grid-area]="id">
        <ng-container *ngTemplateOutlet="activeCardTpl"></ng-container>
      </div>
    } @else {
      <app-quadrant-preview
        [style.grid-area]="id"
        [questionId]="id"
        [questionNumber]="numbers.get(id)!"
        [shortLabel]="shortLabels.get(id)!"
        [items]="form.model()[id]"
        (activate)="onActivate(id)"
      />
    }
  }

  @if (form.isLocked()) {
    <app-lock-overlay />
  }
</section>

<section class="descartes-form__mobile" aria-label="Descartes quadrants">
  <app-quadrant-chips
    [activeId]="activeQuadrant()"
    [counts]="form.counts()"
    (select)="onActivate($event)"
  />
  <ng-container *ngTemplateOutlet="activeCardTpl"></ng-container>
</section>

<footer class="descartes-form__footer">
  <button
    matButton="outlined"
    type="button"
    class="descartes-form__btn descartes-form__btn--cancel"
    (click)="form.cancel()"
    i18n="@@cancelBtn"
  >
    Cancel
  </button>
  <button
    matButton="outlined"
    type="button"
    class="descartes-form__btn descartes-form__btn--draft"
    [disabled]="form.isLocked()"
    (click)="form.saveDraft()"
    i18n="@@saveDraftBtn"
  >
    Save Draft
  </button>
  <button
    matButton="filled"
    type="button"
    class="descartes-form__btn"
    [disabled]="form.isLocked()"
    (click)="form.reviewAndConclude()"
    i18n="@@reviewConcludeBtn"
  >
    Review & conclude →
  </button>
</footer>
